<!DOCTYPE html>
<html lang="vi">
<head>
    <title>THIẾT KẾ WEB</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>

    <nav class="navbar">
        <a class="navlink" href="index.html">Trang chủ</a>
        <a class="navlink" href="page1.html">Thông tin cá nhân</a>
        <a class="navlink" href="page2.html">Đăng nhập</a>
        <a class="navlink" href="page3.html">Đăng ký</a>
        <a class="navlink" href="page4.html">Hóa đơn thanh toán</a>
        <a class="navlink" href="page5.html">In bảng cửu chương</a>
        <a class="navlink" href="page6.html">Bảng học phí</a>
        <a class="navlink" href="page7.html">Trang mới</a>
    </nav>

    <div class="main-content">
        <div class="table-wrapper">
            <div class="table-title">Hóa đơn thanh toán</div>

            <table id="Thanhtoan">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên sản phẩm</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Thành tiền</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Sản phẩm A</td>
                        <td class="sl">3</td>
                        <td class="dg">1.000</td>
                        <td class="tt"></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Sản phẩm B</td>
                        <td class="sl">4</td>
                        <td class="dg">2.000</td>
                        <td class="tt"></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Sản phẩm C</td>
                        <td class="sl">5</td>
                        <td class="dg">4.000</td>
                        <td class="tt"></td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>Sản phẩm D</td>
                        <td class="sl">2</td>
                        <td class="dg">5.000</td>
                        <td class="tt"></td>
                    </tr>
                    <tr class="row-total">
                        <td colspan="3">Tổng thanh toán</td>
                        <td colspan="2" id="tong"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const dongia   = document.getElementsByClassName("dg");
        const soluong  = document.getElementsByClassName("sl");
        const thanhtien = document.getElementsByClassName("tt");
        let tong = 0;

        for (let i = 0; i < dongia.length; i++) {
            // Xóa dấu chấm phân cách hàng nghìn trước khi tính
            const dg = parseInt(dongia[i].textContent.replace(/\./g, ""));
            const sl = parseInt(soluong[i].textContent);
            const tt = dg * sl;
            thanhtien[i].textContent = tt.toLocaleString("vi-VN");
            tong += tt;
        }

        document.getElementById("tong").textContent = tong.toLocaleString("vi-VN") + " ₫";
    </script>

</body>
</html>
