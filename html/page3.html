<DOCTYPE html>
<html lang ="vi">
	<head>
		<title> Đăng Ký</title>
		<mate charset= "utf-8">
		<link rel="stylesheet" href ="../css/style3.css">
	</head>
	<body>
		<div class ="container">
			<form id="frmLogin">
				<h3 id="title">Đăng Ký</h3>
				<div class="form-group">
					<center>
					<label for ="txtUsername">Name</label>
					<input class ="form-control" type ="text" id="txtUsername" name="txtUsername"></input>
					</center>
					<center>
					<label for ="txtSĐT">Phone</label>
					<input class ="form-control" type ="tel" id="txtSĐT" name="txtSĐT"></input>
					</center>
					<center>
					<label for ="txtBirthday">Birthday</label>
					<input class ="form-control" type ="date" id="txtBirthday" name="txtBirthday"></input>
					</center>
					<center>
					<label for="address">Đ/C</label><br>
						<input class="form-control" type="text" id="address" name="address" placeholder="Enter your address">
					</center>
				</div>
				<div class ="form-group">
					<center>
					<label for ="txtID">ID</label>
					<input class ="form-control" type ="password" id="txtID" name="txtID"></input>
					<br>
					<label for ="rdLop">Lớp</label><br><br>
					<label><input type ="radio" name="rdLop">DA24TTA</label>
					<label><input type ="radio" name="rdLop">DA24TTB</label>
					<label><input type ="radio" name="rdLop">DA24TTC</label>
					<label><input type ="radio" name="rdLop">DA24TTD</label>
					<br>
					<br>
					<label for ="rdGT">Gới tính</label><br><br>
					<label><input type ="radio" name="rdGT">Nữ</label>
					<label><input type ="radio" name="rdGT">Nam</label>
				</div>
				
				<textarea id="message" row="4" placeholder="Giới thiệu về bản thân....."></textarea>
				<center>
				<input class="button" type="submit" id="sbGui" name="sbGui" value="Gửi"></input>
				</center>
			</form>

		</div>
		
	
	</body>

</html>
