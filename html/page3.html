<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đăng Ký</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../css/style3.css">
</head>
<body>

    <div class="container">
        <h3>Đăng Ký</h3>

        <form id="frmLogin">
            <div class="field">
                <label for="txtUsername">Họ và tên</label>
                <input type="text" id="txtUsername" name="txtUsername" placeholder="Nguyễn Văn A">
            </div>

            <div class="field">
                <label for="txtSDT">Số điện thoại</label>
                <input type="tel" id="txtSDT" name="txtSDT" placeholder="0901 234 567">
            </div>

            <div class="field">
                <label for="txtBirthday">Ngày sinh</label>
                <input type="date" id="txtBirthday" name="txtBirthday">
            </div>

            <div class="field">
                <label for="address">Địa chỉ</label>
                <input type="text" id="address" name="address" placeholder="Số nhà, đường, phường, quận...">
            </div>

            <div class="field">
                <label for="txtID">Mã số sinh viên</label>
                <input type="password" id="txtID" name="txtID" placeholder="••••••••">
            </div>

            <div class="field">
                <label>Lớp</label>
                <div class="radio-group">
                    <label><input type="radio" name="rdLop" value="A"> DA24TTA</label>
                    <label><input type="radio" name="rdLop" value="B"> DA24TTB</label>
                    <label><input type="radio" name="rdLop" value="C"> DA24TTC</label>
                    <label><input type="radio" name="rdLop" value="D"> DA24TTD</label>
                </div>
            </div>

            <div class="field">
                <label>Giới tính</label>
                <div class="radio-group">
                    <label><input type="radio" name="rdGT" value="nam"> Nam</label>
                    <label><input type="radio" name="rdGT" value="nu"> Nữ</label>
                </div>
            </div>

            <div class="field">
                <label for="message">Giới thiệu bản thân</label>
                <textarea id="message" name="message" rows="4" placeholder="Viết vài dòng về bản thân..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Gửi</button>
        </form>
    </div>

</body>
</html>
