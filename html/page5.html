<!DOCTYPE html>
<html lang ="vi">
	<head>
		<title>THIẾT KẾ WEB</title>
		<meta charset= "utf-8">
		<link rel="stylesheet" href="../css/style5.css">
	</head>
	<body>
		 

		<form id="formInbcc">
			<h2>In bảng cửu chương</h2>
			<label for ="txtnumber">Nhập số từ 2-9</label>
					<input class ="form-control" type ="number" max="9" min="2" id="txtnumber" name="txtnumber"></input>
					<button type="button" onclick="inBCC()">In</button>
				<div id="kq"></div>
		</form>		
		<script>
			function inBCC(){
				let num =parseInt(document.getElementById("txtnumber").value);
				let kq="";
				if(num<2||num>9 || isNaN(num)){
					alert("nhập từ 2 đến 9");
					return;
				}
				for (let i=1 ; i<=10 ;i++)
				{ 
					kq+=num + "x " + i + "=" +(num*i) + "<br>";
				}
				document.getElementById("kq").innerHTML= kq;
			}
		</script>
	</body>
	

</html>
